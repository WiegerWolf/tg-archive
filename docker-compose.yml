services:
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://db/tgArchive
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_COOKIE_SECRET=${ADMIN_COOKIE_SECRET:-}
      - ADMIN_SESSION_TTL_MS=${ADMIN_SESSION_TTL_MS:-1209600000}
      - ADMIN_COOKIE_SECURE=${ADMIN_COOKIE_SECURE:-false}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-tg-archive}
    depends_on:
      - db
      - minio
    networks:
      - app-network

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=mongodb://db/tgArchive
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PASSWORD=${TELEGRAM_PASSWORD}
      - TELEGRAM_SESSION_STRING=${TELEGRAM_SESSION_STRING}
      - TELEGRAM_EXPORTS_DIR=/exports
      - IMPORT_BEFORE_LIVE_SYNC=${IMPORT_BEFORE_LIVE_SYNC:-true}
      - S3_ENDPOINT_HOST=minio
      - S3_ENDPOINT_PORT=9000
      - S3_USE_SSL=false
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET_NAME=${MINIO_BUCKET_NAME:-tg-archive}
    volumes:
      - ${TELEGRAM_EXPORTS_DIR:-./data/telegram-exports}:/exports:ro
    depends_on:
      - db
      - minio
    networks:
      - app-network

  db:
    image: mongo:4.4
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  minio:
    image: minio/minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: localhost
      MINIO_REGION_NAME: us-east-1
    command: server /data --console-address ":9001"
    volumes:
      - type: bind
        source: ${MINIO_DATA_DIR:-./data/minio-data}
        target: /data
        bind:
          create_host_path: false
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
