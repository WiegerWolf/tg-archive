<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 290" width="100%" height="100%">
  <defs>
    <linearGradient id="folderBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A85C4" />
      <stop offset="100%" stop-color="#126499" />
    </linearGradient>
    <linearGradient id="folderFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2AABEE" />
      <stop offset="100%" stop-color="#1B8CD4" />
    </linearGradient>
    <filter id="folderInnerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="-2" stdDeviation="4" flood-color="#000000" flood-opacity="0.25" />
    </filter>
    <filter id="planeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <g id="logo-icon">
    <path d="M 60 70 L 110 70 Q 120 70 125 78 L 135 92 Q 140 100 150 100 L 230 100 Q 240 100 240 110 L 240 230 Q 240 240 230 240 L 60 240 Q 50 240 50 230 L 50 80 Q 50 70 60 70 Z" fill="url(#folderBack)" />

    <rect x="67" y="122" width="6" height="6" fill="#93C5FD" rx="1" transform="rotate(15 70 125)" />
    <rect x="53" y="138" width="4" height="4" fill="#93C5FD" rx="0.5" opacity="0.7" transform="rotate(15 55 140)" />
    <rect x="43" y="153" width="3" height="3" fill="#93C5FD" opacity="0.4" transform="rotate(15 44 154)" />

    <g filter="url(#planeShadow)">
      <polygon points="80,110 200,50 135,125" fill="#FFFFFF" />
      <polygon points="135,125 200,50 170,150" fill="#E0F2FE" />
      <polygon points="135,125 130,160 156,140" fill="#93C5FD" />
    </g>

    <path d="M 35 140 L 255 140 Q 265 140 263 150 L 240 230 Q 240 240 230 240 L 60 240 Q 50 240 50 230 L 27 150 Q 25 140 35 140 Z" fill="url(#folderFront)" filter="url(#folderInnerShadow)" />

    <g transform="translate(195, 200)" fill="#ffffff">
      <path d="M -16 8 L -16 16 A 16 5 0 0 0 16 16 L 16 8 Z" opacity="0.25" />
      <ellipse cx="0" cy="8" rx="16" ry="5" opacity="0.4" />
      <path d="M -16 0 L -16 8 A 16 5 0 0 0 16 8 L 16 0 Z" opacity="0.4" />
      <ellipse cx="0" cy="0" rx="16" ry="5" opacity="0.6" />
      <path d="M -16 -8 L -16 0 A 16 5 0 0 0 16 0 L 16 -8 Z" opacity="0.6" />
      <ellipse cx="0" cy="-8" rx="16" ry="5" opacity="0.9" />
    </g>
  </g>
</svg>
